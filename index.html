<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>美食大作战 · UI 设计稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
/* ============================================================
   美食大作战 — Design Tokens
   ============================================================ */

:root {
  /* Colors — Brand */
  --c-orange:   #FF9F7A;   /* 主色 暖橘 */
  --c-orange-2: #FFC9A9;   /* 渐变浅头 */
  --c-orange-d: #F28560;   /* pressed */
  --c-mint:     #7AB8A5;   /* 辅色 薄荷 */
  --c-mint-d:   #5C9F8C;
  --c-cream:    #FFD89E;   /* 奶油黄 */
  --c-pink:     #FF8FA3;   /* 柔粉 */
  --c-bg:       #FFF8F0;   /* 奶白 */
  --c-bg-2:     #FCEFDF;   /* 底色描边 */
  --c-ink:      #5C3D2E;   /* 深咖 */
  --c-ink-2:    #8A6B5A;   /* 次级文字 */
  --c-ink-3:    #B69A87;   /* 辅助/占位 */
  --c-ink-4:    #E8D7C4;   /* 分隔线 */
  --c-card:     #FFFFFF;

  /* Gradients */
  --g-btn:   linear-gradient(180deg, #FFB694 0%, #FF9F7A 55%, #FB8C64 100%);
  --g-mint:  linear-gradient(180deg, #9BD0C0 0%, #7AB8A5 100%);
  --g-cream: linear-gradient(180deg, #FFE8BC 0%, #FFD89E 100%);
  --g-pink:  linear-gradient(180deg, #FFAAB9 0%, #FF8FA3 100%);
  --g-card-warm: linear-gradient(160deg, #FFF3E3 0%, #FFE7D0 100%);
  --g-bg: radial-gradient(120% 80% at 50% 0%, #FFF3E0 0%, #FFF8F0 60%);

  /* Shadows */
  --sh-sm:   0 1px 2px rgba(196, 125, 80, 0.08), 0 2px 4px rgba(196, 125, 80, 0.04);
  --sh-md:   0 4px 10px rgba(196, 125, 80, 0.10), 0 2px 4px rgba(196, 125, 80, 0.06);
  --sh-lg:   0 10px 24px rgba(196, 125, 80, 0.14), 0 4px 8px rgba(196, 125, 80, 0.06);
  --sh-btn:  0 6px 14px rgba(255, 127, 80, 0.35), 0 2px 4px rgba(255, 127, 80, 0.25), inset 0 1px 0 rgba(255,255,255,0.5);
  --sh-btn-a:0 3px 8px rgba(255, 127, 80, 0.35), inset 0 1px 0 rgba(255,255,255,0.4);
  --sh-pop:  0 18px 40px rgba(92, 61, 46, 0.18), 0 4px 12px rgba(92, 61, 46, 0.08);

  /* Radii */
  --r-xs: 8px;
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-2xl: 36px;
  --r-pill: 9999px;

  /* Spacing scale (4px base) */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-8: 32px;
  --s-10: 40px;
  --s-12: 48px;

  /* Type scale */
  --f-head:   "ZCOOL KuaiLe", "Smiley Sans", "HYWenHei-85W", "PingFang SC", system-ui, sans-serif;
  --f-body:   -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
  --f-hand:   "Ma Shan Zheng", "Caveat", "PingFang SC", cursive;
  --f-mono:   ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --t-display: 700 28px/1.2 var(--f-head);
  --t-h1:      700 22px/1.3 var(--f-head);
  --t-h2:      600 18px/1.35 var(--f-head);
  --t-h3:      600 16px/1.4 var(--f-body);
  --t-body:    500 15px/1.65 var(--f-body);
  --t-body-s:  500 13px/1.6 var(--f-body);
  --t-cap:     500 12px/1.5 var(--f-body);
  --t-micro:   500 11px/1.4 var(--f-mono);

  /* Motion */
  --ease:      cubic-bezier(.22,.61,.36,1);
  --ease-back: cubic-bezier(.34,1.56,.64,1);
  --dur-fast:  160ms;
  --dur:       260ms;
  --dur-slow:  420ms;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font: var(--t-body);
  color: var(--c-ink);
  background: var(--c-bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; border: 0; background: none; cursor: pointer; color: inherit; }
button:focus-visible { outline: 2px solid var(--c-orange); outline-offset: 2px; }

/* ----------  Primary Button  ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  height: 52px; padding: 0 28px;
  border-radius: var(--r-pill);
  background: var(--g-btn);
  color: #fff;
  font: 600 16px/1 var(--f-head);
  letter-spacing: 0.5px;
  box-shadow: var(--sh-btn);
  transition: transform var(--dur-fast) var(--ease-back),
              box-shadow var(--dur-fast) var(--ease),
              filter var(--dur-fast) var(--ease);
  position: relative; overflow: hidden;
}
.btn::before {
  content: ""; position: absolute; inset: 1px 1px auto 1px; height: 40%;
  background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0));
  border-radius: 9999px 9999px 9999px 9999px / 9999px;
  pointer-events: none;
}
.btn:hover { transform: translateY(-1px); filter: brightness(1.04); }
.btn:active { transform: translateY(1px) scale(0.98); box-shadow: var(--sh-btn-a); }
.btn[disabled] {
  background: #F0E2D0; color: #B69A87; box-shadow: none;
  cursor: not-allowed; transform: none; filter: none;
}
.btn[disabled]::before { display: none; }
.btn-ghost {
  background: transparent; color: var(--c-ink);
  box-shadow: inset 0 0 0 1.5px var(--c-ink-4);
}
.btn-ghost::before { display: none; }
.btn-ghost:hover { background: rgba(255,159,122,0.08); }

/* ----------  Card  ---------- */
.card {
  background: var(--c-card);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-md);
  border: 1px solid rgba(92,61,46,0.05);
}

/* ----------  Tag / Chip  ---------- */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  background: rgba(122,184,165,0.14);
  color: var(--c-mint-d);
  border-radius: var(--r-pill);
  font: 600 11px/1 var(--f-body);
}
.chip-orange { background: rgba(255,159,122,0.14); color: #D6694A; }
.chip-cream { background: rgba(255,216,158,0.3); color: #A0722F; }
.chip-pink { background: rgba(255,143,163,0.15); color: #D6516B; }

/* ----------  Scrollbar hide  ---------- */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { scrollbar-width: none; }

/* ----------  Steam animation (Loading)  ---------- */
@keyframes steamRise {
  0%   { transform: translate(var(--sx,0), 0) scale(0.6); opacity: 0; }
  25%  { opacity: 0.8; }
  80%  { opacity: 0.4; }
  100% { transform: translate(var(--sx,0), -30px) scale(1.1); opacity: 0; }
}
@keyframes bowlBob {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50%     { transform: translateY(-4px) rotate(2deg); }
}
@keyframes sparkle {
  0%,100% { transform: scale(1) rotate(0); opacity: 0.8; }
  50%     { transform: scale(1.3) rotate(180deg); opacity: 1; }
}
@keyframes cardFlip {
  0% { transform: rotateY(180deg); }
  100% { transform: rotateY(0deg); }
}
@keyframes popIn {
  0%   { transform: scale(0.6); opacity: 0; }
  70%  { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes floatUp {
  0%   { transform: translateY(12px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

</style>
<style>
  body {
    background: #FFF8F0;
    background-image:
      radial-gradient(900px 500px at 12% -10%, #FFE7D0 0%, rgba(255,231,208,0) 60%),
      radial-gradient(700px 500px at 110% 120%, #E2EFE8 0%, rgba(226,239,232,0) 55%);
    min-height: 100vh;
  }
  .stage {
    display: grid;
    grid-template-columns: minmax(420px, 820px) 440px;
    gap: 48px;
    padding: 40px 40px 80px;
    max-width: 1440px;
    margin: 0 auto;
    align-items: flex-start;
  }
  @media (max-width: 1100px) {
    .stage { grid-template-columns: 1fr; }
    .phone-col { order: -1; justify-self: center; }
  }
  .phone-col {
    position: sticky;
    top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .phone-shell {
    width: 375px;
    height: 760px;
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    background: #FFF8F0;
    box-shadow: 0 40px 80px rgba(92,61,46,0.18), 0 0 0 12px #1C1C1E, 0 0 0 13px rgba(0,0,0,0.4);
  }
  .phone-shell::before{
    content: ""; position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 28px; border-radius: 18px;
    background: #000; z-index: 100;
  }
  .phone-content {
    width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
    padding-top: 44px;
  }
  .phone-content::-webkit-scrollbar { width: 0; }
  .phone-label {
    font: 500 12px/1 ui-monospace, menlo;
    color: #8A6B5A;
    letter-spacing: 1px;
  }
</style>

<script type="text/babel" data-src="tarot">
// TarotCard.jsx — back + face renderer for 塔罗牌
// Minor-arcana-ish artwork, not any trademarked deck. Uses brand palette.

const MAJOR_ARCANA = [
  { idx: 0,  name: "愚者",   food: "街边关东煮",   icon: "🍢" },
  { idx: 1,  name: "魔术师", food: "铁板炒饭",     icon: "🍳" },
  { idx: 2,  name: "女祭司", food: "白粥咸菜",     icon: "🍚" },
  { idx: 3,  name: "皇后",   food: "奶油烩饭",     icon: "🍲" },
  { idx: 4,  name: "皇帝",   food: "红烧肉盖饭",   icon: "🍖" },
  { idx: 5,  name: "教皇",   food: "寺庙素面",     icon: "🍜" },
  { idx: 6,  name: "恋人",   food: "双人火锅",     icon: "🫕" },
  { idx: 7,  name: "战车",   food: "麻辣香锅",     icon: "🌶" },
  { idx: 8,  name: "力量",   food: "烤肉拼盘",     icon: "🥩" },
  { idx: 9,  name: "隐者",   food: "一人食便当",   icon: "🍱" },
  { idx: 10, name: "命运之轮", food: "盲盒寿司",   icon: "🍣" },
  { idx: 11, name: "正义",   food: "轻食沙拉",     icon: "🥗" },
  { idx: 12, name: "倒吊人", food: "冰镇乌冬",     icon: "🍜" },
  { idx: 13, name: "死神",   food: "重生版螺蛳粉", icon: "🍲" },
  { idx: 14, name: "节制",   food: "养生蒸菜",     icon: "🥟" },
  { idx: 15, name: "恶魔",   food: "炸鸡啤酒",     icon: "🍗" },
  { idx: 16, name: "塔",     food: "变态辣火锅",   icon: "🔥" },
  { idx: 17, name: "星星",   food: "奶油布丁",     icon: "🍮" },
  { idx: 18, name: "月亮",   food: "夜宵烧烤",     icon: "🍢" },
  { idx: 19, name: "太阳",   food: "阳光早午餐",   icon: "🥞" },
  { idx: 20, name: "审判",   food: "昨日剩菜炒饭", icon: "🍚" },
  { idx: 21, name: "世界",   food: "环球自助餐",   icon: "🍽️" },
];

// Card back — a cream envelope stamped with a tiny logo + dotted pattern.
function TarotBack({ w = 72, h = 110, flat = false, style = {} }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: 10,
      background: "linear-gradient(150deg, #F28560 0%, #FF9F7A 48%, #FFB593 100%)",
      position: "relative", overflow: "hidden",
      boxShadow: flat ? "none" : "0 4px 10px rgba(196,97,57,0.28), inset 0 0 0 2px rgba(255,255,255,0.25)",
      ...style,
    }}>
      {/* inner frame */}
      <div style={{
        position: "absolute", inset: 4, border: "1px dashed rgba(255,255,255,0.55)",
        borderRadius: 7,
      }} />
      {/* center medallion */}
      <div style={{
        position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
        flexDirection: "column", gap: 4, color: "#FFF3E0",
      }}>
        <svg width={w*0.42} height={w*0.42} viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="24" r="13" fill="#FFD89E" />
          <ellipse cx="20" cy="19" rx="12" ry="2" fill="#FFF3D6" />
          <circle cx="16" cy="25" r="1.2" fill="#5C3D2E" />
          <circle cx="24" cy="25" r="1.2" fill="#5C3D2E" />
          <path d="M16 29 Q20 32 24 29" stroke="#5C3D2E" strokeWidth="1.3" strokeLinecap="round" fill="none"/>
          <path d="M14 10 Q14 6 17 6 M20 10 Q20 6 23 6 M26 10 Q26 6 29 6" stroke="rgba(255,255,255,0.8)" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
        </svg>
        <div style={{ fontSize: Math.round(w*0.11), fontWeight: 700, letterSpacing: 1, fontFamily: "'ZCOOL KuaiLe', system-ui" }}>美食大作战</div>
      </div>
      {/* corner pips */}
      {["tl","tr","bl","br"].map(k => (
        <div key={k} style={{
          position: "absolute",
          top: k.startsWith("t") ? 8 : "auto", bottom: k.startsWith("b") ? 8 : "auto",
          left: k.endsWith("l") ? 8 : "auto", right: k.endsWith("r") ? 8 : "auto",
          fontSize: 9, color: "rgba(255,255,255,0.7)", fontFamily: "serif",
        }}>✦</div>
      ))}
    </div>
  );
}

// Card face — friendly illustration per card, brand-colored
function TarotFace({ card, w = 120, h = 180, style = {} }) {
  const hueByIdx = [
    ["#FFE8BC","#FFD89E"], // cream
    ["#FFD2BD","#FF9F7A"], // orange
    ["#D6EDE3","#7AB8A5"], // mint
    ["#FFD4DC","#FF8FA3"], // pink
  ];
  const pair = hueByIdx[card.idx % 4];
  return (
    <div style={{
      width: w, height: h, borderRadius: 10,
      background: `linear-gradient(180deg, ${pair[0]} 0%, ${pair[1]} 100%)`,
      position: "relative", overflow: "hidden",
      boxShadow: "0 6px 14px rgba(92,61,46,0.18), inset 0 0 0 2px #FFF8F0",
      color: "#5C3D2E",
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: 10, ...style,
    }}>
      {/* inner frame */}
      <div style={{
        position: "absolute", inset: 6, border: "1.2px solid rgba(92,61,46,0.25)",
        borderRadius: 7, pointerEvents: "none",
      }} />
      {/* top roman numeral */}
      <div style={{
        fontFamily: "serif", fontSize: Math.round(w*0.1),
        fontWeight: 600, letterSpacing: 1, opacity: 0.7, marginTop: 2,
      }}>
        {toRoman(card.idx)}
      </div>
      {/* big emoji illustration */}
      <div style={{
        flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: Math.round(w*0.55), lineHeight: 1,
        filter: "drop-shadow(0 3px 4px rgba(92,61,46,0.15))",
      }}>{card.icon}</div>
      {/* card name */}
      <div style={{
        fontFamily: "'ZCOOL KuaiLe', system-ui", fontWeight: 700,
        fontSize: Math.round(w*0.12), letterSpacing: 1, marginBottom: 2,
      }}>{card.name}</div>
      {/* corner pip */}
      <div style={{
        position: "absolute", top: 8, right: 10, fontSize: Math.round(w*0.08),
        color: "rgba(92,61,46,0.5)", fontFamily: "serif",
      }}>✦</div>
      <div style={{
        position: "absolute", bottom: 8, left: 10, fontSize: Math.round(w*0.08),
        color: "rgba(92,61,46,0.5)", fontFamily: "serif",
      }}>✦</div>
    </div>
  );
}

function toRoman(n) {
  if (n === 0) return "0";
  const M = [
    [10,"X"],[9,"IX"],[5,"V"],[4,"IV"],[1,"I"]
  ];
  let out = "", rem = n;
  for (const [v, s] of M) while (rem >= v) { out += s; rem -= v; }
  return out;
}

Object.assign(window, { MAJOR_ARCANA, TarotBack, TarotFace });

</script>
<script type="text/babel" data-src="spec">
// SpecPanel.jsx — Visual system showcase (color / type / spacing / radii / buttons / loading)

function SpecSection({ title, subtitle, children }) {
  return (
    <section style={{ marginBottom: 40 }}>
      <div style={{ marginBottom: 16 }}>
        <div style={{ font: "700 20px/1.3 'ZCOOL KuaiLe', system-ui", color: "#5C3D2E" }}>{title}</div>
        {subtitle && <div style={{ font: "500 13px/1.5 system-ui", color: "#8A6B5A", marginTop: 4 }}>{subtitle}</div>}
      </div>
      <div className="card" style={{ padding: 24 }}>{children}</div>
    </section>
  );
}

function Swatch({ name, hex, gradient, note, ink = "#5C3D2E" }) {
  return (
    <div style={{ width: 140 }}>
      <div style={{
        height: 92, borderRadius: 20,
        background: gradient || hex,
        boxShadow: "inset 0 0 0 1px rgba(92,61,46,0.08), 0 3px 8px rgba(92,61,46,0.08)",
        marginBottom: 10, position: "relative", overflow: "hidden",
      }}>
        <div style={{
          position: "absolute", bottom: 8, right: 10,
          font: "500 10px/1 ui-monospace, menlo", color: ink, opacity: 0.5,
        }}>{hex?.toUpperCase()}</div>
      </div>
      <div style={{ font: "600 13px/1.3 'ZCOOL KuaiLe', system-ui", color: "#5C3D2E" }}>{name}</div>
      {note && <div style={{ font: "500 11px/1.4 system-ui", color: "#8A6B5A", marginTop: 2 }}>{note}</div>}
    </div>
  );
}

function ColorsSpec() {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 20 }}>
      <Swatch name="主色 · 暖橘"   hex="#FF9F7A" note="主要按钮 / 高亮"/>
      <Swatch name="辅色 · 薄荷"   hex="#7AB8A5" note="塔罗轻量神秘"/>
      <Swatch name="点缀 · 奶油"   hex="#FFD89E" note="背景 / 标签"/>
      <Swatch name="点缀 · 柔粉"   hex="#FF8FA3" note="强调 / 心情"/>
      <Swatch name="背景 · 奶白"   hex="#FFF8F0" note="主背景"/>
      <Swatch name="文字 · 深咖"   hex="#5C3D2E" note="正文"/>
      <Swatch name="主按钮渐变"    hex="FF9F7A→F28560" gradient="linear-gradient(180deg,#FFB694,#FF9F7A 55%,#FB8C64)" note="CTA"/>
      <Swatch name="温暖卡片底"    hex="FFF3E3→FFE7D0" gradient="linear-gradient(160deg,#FFF3E3,#FFE7D0)" note="推荐卡片"/>
    </div>
  );
}

function TypeSpec() {
  const row = (sample, spec, meta) => (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 180px", alignItems: "baseline",
      padding: "14px 0", borderBottom: "1px dashed #E8D7C4" }}>
      <div style={{ font: spec, color: "#5C3D2E" }}>{sample}</div>
      <div style={{ font: "500 11px/1.4 ui-monospace,menlo", color: "#8A6B5A" }}>{meta}</div>
    </div>
  );
  return (
    <div>
      {row("美食大作战",          "700 28px/1.2 'ZCOOL KuaiLe', system-ui",   "Display · 28/34 · 站酷庆科黄油体")}
      {row("深呼吸，选一个今日心情","700 22px/1.3 'ZCOOL KuaiLe', system-ui",   "H1 · 22/29")}
      {row("今日能量解读",          "600 18px/1.35 'ZCOOL KuaiLe', system-ui",  "H2 · 18/24")}
      {row("川味辣子鸡",            "600 16px/1.4 system-ui",                   "H3 · 16/22")}
      {row("好家伙，今天这牌阵简直是把“油门焊死”写脸上了。", "500 15px/1.65 system-ui", "Body · 15/25")}
      {row("选 3 张卡牌（必选）",    "500 13px/1.6 system-ui",                   "Body-s · 13/21")}
      {row("塔罗 · 轻食版",          "500 12px/1.5 system-ui",                   "Caption · 12/18")}
      {row("STEP 01",               "500 11px/1.4 ui-monospace, menlo",         "Micro · 11 · 等宽")}
    </div>
  );
}

function SpacingSpec() {
  const steps = [4,8,12,16,20,24,32,40,48];
  return (
    <div>
      <div style={{ display: "flex", gap: 14, alignItems: "flex-end", flexWrap: "wrap", marginBottom: 18 }}>
        {steps.map(n => (
          <div key={n} style={{ textAlign: "center" }}>
            <div style={{ width: 56, height: n, background: "linear-gradient(180deg,#FFC9A9,#FF9F7A)",
              borderRadius: 4, marginBottom: 6 }}/>
            <div style={{ font: "600 11px/1 ui-monospace, menlo", color: "#5C3D2E" }}>{n}</div>
            <div style={{ font: "500 10px/1 system-ui", color: "#B69A87", marginTop: 3 }}>s-{steps.indexOf(n)+1}</div>
          </div>
        ))}
      </div>
      <div style={{ font: "500 12px/1.5 system-ui", color: "#8A6B5A" }}>
        4px 基准 · 卡片内边距用 20–24 · 区块间距 32–40 · 移动端外边距 20
      </div>
    </div>
  );
}

function RadiiSpec() {
  const radii = [
    { name: "xs", val: 8, use: "小标签" },
    { name: "sm", val: 12, use: "输入框" },
    { name: "md", val: 16, use: "小卡片" },
    { name: "lg", val: 20, use: "心情卡" },
    { name: "xl", val: 28, use: "主卡片" },
    { name: "2xl", val: 36, use: "结果气泡" },
    { name: "pill", val: 999, use: "按钮/Chip" },
  ];
  return (
    <div style={{ display: "flex", gap: 18, flexWrap: "wrap" }}>
      {radii.map(r => (
        <div key={r.name} style={{ width: 90, textAlign: "center" }}>
          <div style={{
            width: 78, height: 78, borderRadius: r.val,
            background: "#FFF3E3", border: "1.5px dashed #E2B897", margin: "0 auto 8px",
            display: "flex", alignItems: "center", justifyContent: "center",
            font: "600 12px/1 ui-monospace, menlo", color: "#8A6B5A",
          }}>{r.val === 999 ? "∞" : r.val}</div>
          <div style={{ font: "600 12px/1.3 'ZCOOL KuaiLe', system-ui", color: "#5C3D2E" }}>r-{r.name}</div>
          <div style={{ font: "500 10px/1.3 system-ui", color: "#B69A87" }}>{r.use}</div>
        </div>
      ))}
    </div>
  );
}

function ButtonsSpec() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
        <button className="btn">开始占卜吃什么</button>
        <button className="btn" style={{ transform: "translateY(1px) scale(0.98)", boxShadow: "var(--sh-btn-a)" }}>按下态</button>
        <button className="btn" disabled>禁用态</button>
        <button className="btn btn-ghost">再抽一次</button>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <span className="chip">✦ 薄荷</span>
        <span className="chip chip-orange">✦ 暖橘</span>
        <span className="chip chip-cream">✦ 奶油</span>
        <span className="chip chip-pink">✦ 柔粉</span>
      </div>
      <div style={{ font: "500 12px/1.5 system-ui", color: "#8A6B5A" }}>
        按钮高度 52px (手指友好 &gt; 44pt) · 圆角 pill · hover 上移 1px · active 下移 1px + 缩 0.98
      </div>
    </div>
  );
}

function LoadingSpec() {
  return (
    <div style={{ display: "flex", gap: 32, alignItems: "center" }}>
      <LoadingBowl size={120}/>
      <div>
        <div style={{ font: "600 14px/1.4 'ZCOOL KuaiLe', system-ui", color: "#5C3D2E" }}>
          🍜 蒸汽小碗
        </div>
        <div style={{ font: "500 12px/1.6 system-ui", color: "#8A6B5A", maxWidth: 320 }}>
          碗体 4s 轻微左右摇晃；蒸汽 3 条交错升起 (2.4s ease-out, 延迟 0/0.6/1.2s)。
          用在 AI 推理、翻牌过场。
        </div>
      </div>
    </div>
  );
}

function LoadingBowl({ size = 96 }) {
  const s = size;
  return (
    <div style={{ position: "relative", width: s, height: s*1.3, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      {/* steam */}
      {[0, 0.6, 1.2].map((d, i) => (
        <div key={i} style={{
          position: "absolute", top: 0, left: "50%",
          width: 10, height: 14, borderRadius: 10,
          background: "rgba(122,184,165,0.55)",
          "--sx": `${(i-1)*8}px`,
          animation: `steamRise 2.4s ease-out ${d}s infinite`,
          transformOrigin: "center bottom",
          marginLeft: (i-1)*14 - 5,
        }}/>
      ))}
      {/* bowl */}
      <div style={{
        width: s, height: s*0.75, position: "relative",
        animation: "bowlBob 3.2s ease-in-out infinite",
      }}>
        <svg viewBox="0 0 100 75" width={s} height={s*0.75}>
          <defs>
            <linearGradient id="bowl2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stopColor="#FFC9A9"/>
              <stop offset="1" stopColor="#FF9F7A"/>
            </linearGradient>
            <linearGradient id="soup2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stopColor="#FFF3D6"/>
              <stop offset="1" stopColor="#FFD89E"/>
            </linearGradient>
          </defs>
          <ellipse cx="50" cy="26" rx="42" ry="6" fill="url(#soup2)"/>
          <path d="M8 26 Q8 24 12 24 H88 Q92 24 92 26 L88 60 Q72 72 50 72 Q28 72 12 60 Z" fill="url(#bowl2)"/>
          {/* face */}
          <circle cx="38" cy="46" r="2.5" fill="#5C3D2E"/>
          <circle cx="62" cy="46" r="2.5" fill="#5C3D2E"/>
          <path d="M40 54 Q50 60 60 54" stroke="#5C3D2E" strokeWidth="2.2" strokeLinecap="round" fill="none"/>
          <ellipse cx="30" cy="54" rx="3" ry="2" fill="#FF8FA3" opacity="0.55"/>
          <ellipse cx="70" cy="54" rx="3" ry="2" fill="#FF8FA3" opacity="0.55"/>
        </svg>
      </div>
    </div>
  );
}

function SpecPanel() {
  return (
    <div style={{ padding: "40px 32px 60px", maxWidth: 760 }}>
      <div style={{ marginBottom: 32 }}>
        <div className="chip chip-orange" style={{ marginBottom: 10 }}>DESIGN SYSTEM · v1.0</div>
        <h1 style={{ font: "700 36px/1.15 'ZCOOL KuaiLe', system-ui", margin: 0, color: "#5C3D2E" }}>
          美食大作战 · 视觉规范
        </h1>
        <div style={{ font: "500 14px/1.6 system-ui", color: "#8A6B5A", marginTop: 8, maxWidth: 520 }}>
          早午餐咖啡馆菜单 × 网易云评论区 × 少女心塔罗。温暖治愈、食欲感强，
          一点点神秘但不黑暗。
        </div>
      </div>
      <SpecSection title="01 · 配色" subtitle="主辅 + 点缀 + 渐变 · 主色暖橘贯穿所有 CTA">
        <ColorsSpec/>
      </SpecSection>
      <SpecSection title="02 · 字号层级" subtitle="中文可爱圆润 + 系统字正文 · 8 级"><TypeSpec/></SpecSection>
      <SpecSection title="03 · 间距规则" subtitle="4px 基准 · 1–12 共 9 档"><SpacingSpec/></SpecSection>
      <SpecSection title="04 · 圆角规则" subtitle="从标签到气泡，圆角随尺寸放大"><RadiiSpec/></SpecSection>
      <SpecSection title="05 · 按钮与标签" subtitle="所有按钮 hover/active/disabled 全态"><ButtonsSpec/></SpecSection>
      <SpecSection title="06 · Loading" subtitle="旋转小碗 + 薄荷色蒸汽"><LoadingSpec/></SpecSection>
    </div>
  );
}

Object.assign(window, { SpecPanel, LoadingBowl });

  const moodObj = MOODS.find(m => m.id === mood);
  const toggle = (i) => {
    setPicks(prev => {
      if (prev.includes(i)) return prev.filter(x => x !== i);
      if (prev.length >= 3) return prev;
      return [...prev, i];
    });
  };
  return (
    <div style={{ padding: "0 20px 20px", animation: "floatUp 420ms cubic-bezier(.22,.61,.36,1)" }}>
      <SectionIntro
        badge="STEP 02"
        title="凭直觉选 3 张"

        right={
          <div className="chip chip-orange" style={{ padding: "5px 10px" }}>
            <span style={{ opacity: 0.7 }}>心情</span>&nbsp;{moodObj?.name}
          </div>
        }
      />

      {/* counter */}
      <div style={{
        marginTop: 12, display: "flex", gap: 8, justifyContent: "center",
      }}>
        {[0,1,2].map(i => (
          <div key={i} style={{
            width: 40, height: 6, borderRadius: 999,
            background: i < picks.length ? "#FF9F7A" : "#F0E2D0",
            transition: "background 260ms var(--ease)",
          }}/>
        ))}
      </div>
      <div style={{ textAlign: "center", font: "500 12px/1.5 system-ui", color: "#8A6B5A", marginTop: 6 }}>
        已选 <b style={{ color: "#D6694A" }}>{picks.length}</b> / 3
      </div>

      {/* deck */}
      {layout === "fan"
        ? <FanDeck picks={picks} toggle={toggle}/>
        : <GridDeck picks={picks} toggle={toggle}/>}

      {/* picked preview */}
      <div style={{ marginTop: 10, display: "flex", gap: 8, justifyContent: "center", minHeight: 68 }}>
        {[0,1,2].map(slot => {
          const idx = picks[slot];
          return (
            <div key={slot} style={{
              width: 46, height: 68, borderRadius: 8,
              border: idx !== undefined ? "none" : "1.5px dashed #E8D7C4",

              color: "#C2A58E", font: "700 14px/1 'ZCOOL KuaiLe', system-ui",

                ? <div style={{ animation: "popIn 320ms var(--ease-back)" }}><TarotBack w={46} h={68}/></div>

        </button>
      </div>
    </div>
  );
}

function FanDeck({ picks, toggle }) {
  // 22 cards arranged in a gentle arc
  const total = 22;
  const cardW = 44, cardH = 68;
  const radius = 360;
  const spread = 70; // degrees total
  return (
    <div style={{
      position: "relative", height: 200, marginTop: 16,
      display: "flex", alignItems: "flex-start", justifyContent: "center",
    }}>
      <div style={{ position: "relative", width: "100%", height: "100%" }}>
        {Array.from({ length: total }).map((_, i) => {
          const t = total === 1 ? 0.5 : i / (total - 1);
          const angle = (t - 0.5) * spread;
          const selected = picks.includes(i);
          const selectedSlot = picks.indexOf(i);
          const rad = (angle * Math.PI) / 180;
          const cx = 335 / 2; // approx 375 - 40 padding
          const x = cx + Math.sin(rad) * 130 - cardW / 2;
          const y = (1 - Math.cos(rad)) * 90 + 50;
          return (
            <button
              key={i}
              onClick={() => toggle(i)}
              style={{
                position: "absolute",
                left: x, top: selected ? y - 22 : y,
                transform: `rotate(${angle}deg) ${selected ? "translateY(-6px)" : ""}`,
                transformOrigin: "center bottom",
                transition: "top 240ms cubic-bezier(.34,1.56,.64,1), transform 240ms cubic-bezier(.34,1.56,.64,1), filter 180ms",
                filter: selected ? "drop-shadow(0 8px 14px rgba(255,127,80,0.45))" : "none",
                padding: 0, background: "none", border: 0,
                zIndex: selected ? 100 : i,
              }}
            >
              <div style={{ position: "relative" }}>
                <TarotBack w={cardW} h={cardH} flat/>
                {selected && (
                  <div style={{
                    position: "absolute", top: -8, right: -6,
                    width: 22, height: 22, borderRadius: 999,
                    background: "#FF9F7A", color: "#fff",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    font: "700 12px/1 'ZCOOL KuaiLe', system-ui",
                    boxShadow: "0 3px 6px rgba(255,127,80,0.4)",
                    animation: "popIn 320ms var(--ease-back)",
                  }}>{selectedSlot + 1}</div>
                )}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function GridDeck({ picks, toggle }) {
  return (
    <div style={{
      marginTop: 18, padding: 14, borderRadius: 20,

    </div>
  );
}

function ResultStep({ mood, picks, onRestart, onBack }) {
  const safeMood = MOOD_PICKS[mood] ? mood : "happy";
  const finalPicks = picks.length === 3 ? picks : MOOD_PICKS[safeMood];
  const cards = finalPicks.map(i => MAJOR_ARCANA[i]);
  const recipes = MOOD_RECIPES[safeMood];
  const reading = MOOD_READING[safeMood];
  const moodObj = MOODS.find(m => m.id === safeMood);

  const [flipped, setFlipped] = useState([false, false, false]);
  useEffect(() => {
    // Stagger flip animation
    const timers = [0,1,2].map(i =>
      setTimeout(() => setFlipped(prev => prev.map((v, j) => j === i ? true : v)), 180 + i*220)
    );
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={{ padding: "0 20px 28px", animation: "floatUp 420ms var(--ease)" }}>
      <SectionIntro
        badge="STEP 03"
        title="叮~ 塔罗说话了"

      />

      {/* three flipped cards */}
      <div style={{ display: "flex", justifyContent: "center", gap: 10, margin: "16px 0 18px", perspective: 1000 }}>
        {cards.map((c, i) => (
          <div key={i} style={{
            width: 92, height: 140, position: "relative",
            transformStyle: "preserve-3d",
            transform: flipped[i] ? "rotateY(0)" : "rotateY(180deg)",
            transition: "transform 700ms cubic-bezier(.34,1.3,.64,1)",
          }}>
            <div style={{ position: "absolute", inset: 0, backfaceVisibility: "hidden" }}>
              <TarotFace card={c} w={92} h={140}/>
            </div>
            <div style={{ position: "absolute", inset: 0, backfaceVisibility: "hidden", transform: "rotateY(180deg)" }}>
              <TarotBack w={92} h={140}/>
            </div>

function hexA(hex, a) {
  const h = hex.replace("#","");
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ================================================================
// App shell (inside iPhone)
// ================================================================
function MeishiApp({ tweaks }) {
  const [step, setStep] = useState(tweaks.initialStep || "mood");
  const [mood, setMood] = useState(tweaks.initialMood || "");
  const [picks, setPicks] = useState([]);

  // Sync if tweaks change
  useEffect(() => { setStep(tweaks.initialStep); }, [tweaks.initialStep]);
  useEffect(() => { if (tweaks.initialMood) setMood(tweaks.initialMood); }, [tweaks.initialMood]);

  const bg = tweaks.bgVariant === "mint"
    ? "radial-gradient(120% 80% at 50% 0%, #E8F3EE 0%, #FFF8F0 55%)"
    : tweaks.bgVariant === "pink"
    ? "radial-gradient(120% 80% at 50% 0%, #FFE4EA 0%, #FFF8F0 55%)"
    : "radial-gradient(120% 80% at 50% 0%, #FFF3E0 0%, #FFF8F0 60%)";

  const goDraw = () => { setPicks([]); setStep("draw"); };
  const goLoading = () => {
    setStep("loading");
    setTimeout(() => setStep("result"), 2200);
  };
  const restart = () => { setMood(""); setPicks([]); setStep("mood"); };

  return (
    <div style={{ background: bg, minHeight: "100%", paddingBottom: 30 }}>
      <AppHeader/>
      <StepIndicator step={step}/>
      {step === "mood"    && <MoodStep mood={mood} setMood={setMood} onNext={goDraw}/>}
      {step === "draw"    && <DrawStep mood={mood} picks={picks} setPicks={setPicks} onNext={goLoading} onBack={() => setStep("mood")} layout={tweaks.deckLayout}/>}
      {step === "loading" && <LoadingScreen/>}
      {step === "result"  && <ResultStep mood={mood} picks={picks} onRestart={restart} onBack={() => setStep("draw")}/>}
    </div>
  );
}

Object.assign(window, { MeishiApp, MOODS, TWEAKS });

<script type="text/babel" data-src="tweaks">
// Tweaks.jsx — floating editor surface (controlled by host)

const { useState: useT, useEffect: useEffT } = React;

function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const upd = (k, v) => {
    setTweaks(prev => ({ ...prev, [k]: v }));
    try {
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
    } catch(e) {}
  };
  return (
    <div style={{
      position: "fixed", right: 16, bottom: 16, zIndex: 200,
      width: 260, background: "#fff", borderRadius: 20,
      boxShadow: "0 20px 40px rgba(92,61,46,0.22), 0 6px 14px rgba(92,61,46,0.08)",
      border: "1px solid rgba(92,61,46,0.08)",
      padding: 16, font: "500 13px/1.5 system-ui", color: "#5C3D2E",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <span style={{ width: 8, height: 8, borderRadius: 999, background: "#FF9F7A", boxShadow: "0 0 0 4px rgba(255,159,122,0.2)" }}/>
        <div style={{ font: "700 14px/1 'ZCOOL KuaiLe', system-ui" }}>Tweaks</div>
      </div>
      <TRow label="跳到哪一步">
        <TSeg value={tweaks.initialStep} onChange={v => upd("initialStep", v)}
              options={[["mood","心情"],["draw","抽牌"],["loading","Loading"],["result","结果"]]}/>
      </TRow>
      <TRow label="预选心情">
        <TSeg value={tweaks.initialMood || ""} onChange={v => upd("initialMood", v)}
              options={[["","无"],["happy","美滋滋"],["energetic","元气"],["emo","emo"],["crash","裂开"]]}/>
      </TRow>
      <TRow label="卡牌布局">
        <TSeg value={tweaks.deckLayout} onChange={v => upd("deckLayout", v)}
              options={[["fan","扇形"],["grid","网格"]]}/>
      </TRow>
      <TRow label="背景色调">
        <TSeg value={tweaks.bgVariant} onChange={v => upd("bgVariant", v)}
              options={[["warm","暖橘"],["mint","薄荷"],["pink","柔粉"]]}/>
      </TRow>
    </div>
  );
}

function TRow({ label, children }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ font: "600 11px/1 system-ui", color: "#8A6B5A", marginBottom: 6, letterSpacing: 0.5 }}>{label}</div>
      {children}
    </div>
  );
}
function TSeg({ value, onChange, options }) {
  return (
    <div style={{ display: "flex", background: "#FFF3E3", padding: 3, borderRadius: 999, gap: 2, flexWrap: "wrap" }}>
      {options.map(([v,l]) => (
        <button key={v} onClick={() => onChange(v)} style={{
          flex: 1, minWidth: 40,
          padding: "6px 8px", borderRadius: 999,
          background: value === v ? "#fff" : "transparent",
          boxShadow: value === v ? "0 2px 4px rgba(92,61,46,0.1)" : "none",
          font: "600 11px/1 system-ui", color: value === v ? "#D6694A" : "#8A6B5A",
          transition: "all 160ms var(--ease)",
          whiteSpace: "nowrap",
        }}>{l}</button>
      ))}
    </div>
  );
}

Object.assign(window, { TweaksPanel });

</script>

<script type="text/babel">
const { useState, useEffect } = React;

function Root() {
  const [tweaks, setTweaks] = useState(window.TWEAKS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setEditMode(true);
      if (d.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", handler);
    // announce availability AFTER listener is attached
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch(e) {}
    return () => window.removeEventListener("message", handler);
  }, []);

  return (
    <>
      <div className="stage">
        <SpecPanel/>
        <div className="phone-col">
          <div className="phone-label">iPhone · 375×760 · Live Prototype</div>
          <div className="phone-shell">
            <div className="phone-content">
              <MeishiApp tweaks={tweaks}/>
            </div>
            <div style={{
              position: "absolute", bottom: 6, left: 0, right: 0, display: "flex", justifyContent: "center",
              pointerEvents: "none",
            }}>
              <div style={{ width: 134, height: 5, borderRadius: 999, background: "rgba(0,0,0,0.35)" }}/>
            </div>
          </div>
          <div style={{ font: "500 11px/1.5 system-ui", color: "#B69A87", textAlign: "center", maxWidth: 320 }}>
            点开心情 → 选 3 张卡牌 → 看塔罗吐槽你今天吃啥。<br/>
            打开 Tweaks 可跳到任意步骤或切换布局。
          </div>
        </div>
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={editMode}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
